services:
  hoarder:
    image: ghcr.io/hoarder-app/hoarder:release
    restart: unless-stopped
    ports:
      - "${HOST_PORT_3000:-3000}:3000"
    env_file:
      - .env
    environment:
      MEILI_ADDR: http://meilisearch:7700
      DATA_DIR: /data
    volumes:
      - hoarder_data:/data
    depends_on:
      - meilisearch

  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data

volumes:
  hoarder_data:
  meilisearch_data:
