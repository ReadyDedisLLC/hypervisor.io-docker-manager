services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT_8686:-8686}:8686"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: Etc/UTC
    volumes:
      - lidarr_config:/config
      - lidarr_music:/music
      - lidarr_downloads:/downloads

volumes:
  lidarr_config:
  lidarr_music:
  lidarr_downloads:
