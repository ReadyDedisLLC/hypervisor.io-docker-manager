services:
  readarr:
    image: lscr.io/linuxserver/readarr:develop
    restart: unless-stopped
    ports:
      - "${HOST_PORT_8787:-8787}:8787"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: Etc/UTC
    volumes:
      - readarr_config:/config
      - readarr_books:/books
      - readarr_downloads:/downloads

volumes:
  readarr_config:
  readarr_books:
  readarr_downloads:
