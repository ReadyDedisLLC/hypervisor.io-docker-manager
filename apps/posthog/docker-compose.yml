services:
  posthog:
    image: posthog/posthog:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT_8000:-8097}:8000"
    environment:
      DATABASE_URL: postgresql://posthog:${POSTHOG_DB_PASSWORD}@db:5432/posthog
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      - db
      - redis
      - clickhouse

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: ${POSTHOG_DB_PASSWORD}
      POSTGRES_DB: posthog
    volumes:
      - posthog_db:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - posthog_redis:/data

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    volumes:
      - posthog_clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  posthog_db:
  posthog_redis:
  posthog_clickhouse:
