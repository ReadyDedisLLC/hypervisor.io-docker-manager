services:
  navidrome:
    image: deluan/navidrome:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT_4533:-4533}:4533"
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
    volumes:
      - navidrome_data:/data
      - navidrome_music:/music:ro

volumes:
  navidrome_data:
  navidrome_music:
