services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    ports:
      - "${HOST_PORT_51820:-51820}:51820/udp"
      - "${HOST_PORT_51821:-51821}:51821/tcp"
    env_file:
      - .env
    volumes:
      - wg_easy_data:/etc/wireguard

volumes:
  wg_easy_data:
