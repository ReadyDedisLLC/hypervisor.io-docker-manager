services:
  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT_8200:-8200}:8200"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    volumes:
      - duplicati_config:/config
      - duplicati_backups:/backups
      - duplicati_source:/source:ro

volumes:
  duplicati_config:
  duplicati_backups:
  duplicati_source:
