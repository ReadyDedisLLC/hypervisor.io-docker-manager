services:
  zulip:
    image: zulip/docker-zulip:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT_80:-8080}:80"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_HOST_PORT: "5432"
      DB_USER: zulip
      DISABLE_HTTPS: "True"
      SSL_CERTIFICATE_GENERATION: self-signed
      SECRETS_email_password: ""
    volumes:
      - zulip_data:/data
    depends_on:
      - postgres
      - memcached
      - rabbitmq
      - redis

  postgres:
    image: zulip/zulip-postgresql:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: zulip
      POSTGRES_USER: zulip
      POSTGRES_PASSWORD: ${SECRETS_postgres_password}
    volumes:
      - pgdata:/var/lib/postgresql/data

  memcached:
    image: memcached:alpine
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  zulip_data:
  pgdata:
  rabbitmq_data:
  redis_data:
