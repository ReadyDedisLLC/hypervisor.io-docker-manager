services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4
    restart: unless-stopped
    ports:
      - "${HOST_PORT_8989:-8989}:8989"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    volumes:
      - sonarr_config:/config
      - sonarr_tv:/tv
      - sonarr_downloads:/downloads

volumes:
  sonarr_config:
  sonarr_tv:
  sonarr_downloads:
