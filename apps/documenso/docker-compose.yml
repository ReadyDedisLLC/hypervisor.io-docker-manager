services:
  documenso:
    image: documenso/documenso:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT_3000:-3000}:3000"
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PRIVATE_ENCRYPTION_KEY: ${NEXT_PRIVATE_ENCRYPTION_KEY}
      NEXT_PRIVATE_DATABASE_URL: postgresql://documenso:${POSTGRES_PASSWORD}@db:5432/documenso
      NEXT_PUBLIC_WEBAPP_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: documenso
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: documenso
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
