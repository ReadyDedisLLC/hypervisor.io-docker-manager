services:
  kimai:
    image: kimai/kimai2:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "${HOST_PORT_8001:-8001}:8001"
    environment:
      ADMINMAIL: ${ADMIN_EMAIL}
      ADMINPASS: ${ADMIN_PASSWORD}
      DATABASE_URL: mysql://kimai:${DATABASE_PASSWORD}@db:3306/kimai?charset=utf8mb4
    volumes:
      - kimai_data:/opt/kimai/var
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: kimai
      MYSQL_USER: kimai
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  kimai_data:
  db_data:
