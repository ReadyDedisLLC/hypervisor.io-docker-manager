services:
  app:
    image: quay.io/hedgedoc/hedgedoc:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT_3000:-3000}:3000"
    env_file:
      - .env
    environment:
      CMD_DB_URL: postgres://hedgedoc:${CMD_DB_PASSWORD}@db:5432/hedgedoc
    volumes:
      - hedgedoc_uploads:/hedgedoc/public/uploads
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hedgedoc
      POSTGRES_PASSWORD: ${CMD_DB_PASSWORD}
      POSTGRES_DB: hedgedoc
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  hedgedoc_uploads:
  pgdata:
