services:
  radarr:
    image: lscr.io/linuxserver/radarr:5
    restart: unless-stopped
    ports:
      - "${HOST_PORT_7878:-7878}:7878"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    volumes:
      - radarr_config:/config
      - radarr_movies:/movies
      - radarr_downloads:/downloads

volumes:
  radarr_config:
  radarr_movies:
  radarr_downloads:
