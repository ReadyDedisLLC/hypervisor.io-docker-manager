services:
  api:
    image: langgenius/dify-api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODE: api
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      - postgres
      - redis

  worker:
    image: langgenius/dify-worker:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODE: worker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      - postgres
      - redis

  web:
    image: langgenius/dify-web:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT_3000:-3000}:3000"
    environment:
      CONSOLE_API_URL: http://api:5001
      APP_API_URL: http://api:5001
    depends_on:
      - api

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: dify
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

volumes:
  dify_storage:
  postgres_data:
  redis_data:
