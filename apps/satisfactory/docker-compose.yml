services:
  satisfactory:
    image: wolveix/satisfactory-server:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT_7777:-7777}:7777/udp"
      - "${HOST_PORT_15000:-15000}:15000/udp"
      - "${HOST_PORT_15777:-15777}:15777/udp"
    env_file:
      - .env
    volumes:
      - satisfactory_config:/config

volumes:
  satisfactory_config:
