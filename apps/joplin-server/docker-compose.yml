services:
  joplin:
    image: joplinapp/server:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT_22300:-22300}:22300"
    env_file:
      - .env
    environment:
      DB_CLIENT: pg
      DATABASE_URL: postgresql://joplin:${POSTGRES_PASSWORD}@db:5432/joplin
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: joplin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: joplin
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
